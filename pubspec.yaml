name: chess_app
description: "A chess GUI."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  flutter_svg: ^2.2.0
  window_manager: ^0.5.1
  go_router: ^17.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_soloud: ^3.3.3
  ffi: ^2.1.4
  dart_mappable: ^4.6.1
  auto_size_text_plus: ^3.0.2
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  dart_mappable_builder: ^4.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/backgrounds/pieces/
    - assets/images/chess_pieces/white/
    - assets/images/chess_pieces/black/
    - assets/images/tiles/
    - assets/sounds/
